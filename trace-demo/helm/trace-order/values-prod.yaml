# 生产环境配置示例

replicaCount: 3

image:
  repository: your-registry/trace-order
  tag: "1.0.0"
  pullPolicy: Always

imagePullSecrets:
  - name: registry-secret

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: JAVA_OPTS
    value: "-Xms512m -Xmx1024m"

service:
  type: ClusterIP
  port: 8081

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

healthCheck:
  enabled: true
  path: /order/health
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  path: /order/health
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30

skywalking:
  enabled: true
  collectorBackendService: "prod-skywalking:11800"
  serviceName: "trace-order-prod"

configMap:
  create: true
  data:
    application.yml: |
      server:
        port: 8081
      
      spring:
        application:
          name: trace-order
      
      app:
        inventory-service-url: http://trace-inventory:8082
        environment: PROD
        environment-name: 生产环境
        timeout: 2000
      
      logging:
        level:
          root: WARN
          com.example.order: INFO
      
      server:
        tomcat:
          threads:
            max: 200
            min-spare: 20
          connection-timeout: 2000

logVolume:
  enabled: true
  size: 10Gi
  storageClassName: standard

podDisruptionBudget:
  enabled: true
  minAvailable: 2

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
