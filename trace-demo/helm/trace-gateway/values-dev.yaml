# 开发环境配置示例

replicaCount: 1

image:
  repository: trace-gateway
  tag: "1.0.0"
  pullPolicy: IfNotPresent

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "dev"
  - name: JAVA_OPTS
    value: "-Xms256m -Xmx512m"

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

skywalking:
  enabled: true
  collectorBackendService: "skywalking-oap.skywalking:11800"
  serviceName: "trace-gateway-dev"

configMap:
  create: true
  data:
    application.yml: |
      server:
        port: 8080
      
      spring:
        application:
          name: trace-gateway
        cloud:
          gateway:
            routes:
              - id: order-service
                uri: http://trace-order:8081
                predicates:
                  - Path=/order/**
              - id: inventory-service
                uri: http://trace-inventory:8082
                predicates:
                  - Path=/inventory/**
      
      app:
        environment: DEV
        environment-name: 开发环境
      
      logging:
        level:
          root: INFO
          com.example.gateway: DEBUG
          org.springframework.cloud.gateway: DEBUG

logVolume:
  enabled: true
  size: 5Gi
