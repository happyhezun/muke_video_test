# 生产环境配置示例

replicaCount: 2

image:
  repository: your-registry/trace-gateway
  tag: "1.0.0"
  pullPolicy: Always

imagePullSecrets:
  - name: registry-secret

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "prod"
  - name: JAVA_OPTS
    value: "-Xms512m -Xmx1024m"

service:
  type: LoadBalancer
  port: 8080

resources:
  limits:
    cpu: 1000m
    memory: 1024Mi
  requests:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75

healthCheck:
  enabled: true
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3
  successThreshold: 1

startupProbe:
  enabled: true
  path: /health
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 30

skywalking:
  enabled: true
  collectorBackendService: "prod-skywalking:11800"
  serviceName: "trace-gateway-prod"

configMap:
  create: true
  data:
    application.yml: |
      server:
        port: 8080
      
      spring:
        application:
          name: trace-gateway
        cloud:
          gateway:
            routes:
              - id: order-service
                uri: http://trace-order:8081
                predicates:
                  - Path=/order/**
              - id: inventory-service
                uri: http://trace-inventory:8082
                predicates:
                  - Path=/inventory/**
            default-filters:
              - AddResponseHeader=X-Environment, ${app.environment}
      
      app:
        environment: PROD
        environment-name: 生产环境
      
      logging:
        level:
          root: WARN
          com.example.gateway: INFO
      
      reactor:
        netty:
          connection-provider:
            max-connections: 500
            pending-acquire-timeout: 30000

logVolume:
  enabled: true
  size: 10Gi
  storageClassName: standard

podDisruptionBudget:
  enabled: true
  minAvailable: 1

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
